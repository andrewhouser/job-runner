services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: development
    volumes:
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/server/src:/app/packages/server/src
      - server_node_modules:/app/node_modules
    command: pnpm exec tsx watch packages/server/src/index.ts

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: development
    volumes:
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/dashboard/src:/app/packages/dashboard/src
      - dashboard_node_modules:/app/node_modules
    command: pnpm --filter @job-runner/dashboard dev

volumes:
  server_node_modules:
  dashboard_node_modules:
