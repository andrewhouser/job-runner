services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
      dashboard:
        condition: service_started
    networks:
      - job-runner-network

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      - PORT=3001
      - CORS_ORIGIN=https://localhost
    networks:
      - job-runner-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/jobs"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=https://localhost
    networks:
      - job-runner-network

networks:
  job-runner-network:
    driver: bridge
